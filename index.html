<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL INTELLIGENCE NETWORK - V3.0</title>
    <style>
        :root {
            --fbi-green: #00ff00;
            --fbi-dark-green: #004400;
            --fbi-bg: #000000;
            --fbi-red: #ff3333;
            --fbi-orange: #ff8800;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--fbi-bg);
            color: var(--fbi-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none; /* 防止特工手抖复制界面内容 */
        }

        /* 屏幕扫描线特效（沉浸感核心） */
        body::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* 语言切换按钮 */
        #lang-toggle {
            position: absolute; top: 20px; right: 30px; z-index: 1000;
            cursor: pointer; border: 1px solid var(--fbi-dark-green); padding: 5px 10px;
            background: rgba(0,20,0,0.8); font-weight: bold; transition: 0.3s;
        }
        #lang-toggle:hover { background: var(--fbi-green); color: #000; border-color: var(--fbi-green); }

        /* --- 登录屏幕（全屏居中） --- */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease;
        }

        /* 重新设计的登录区域（去掉对话框） */
        .login-box {
            /* 去掉边框、阴影、半透明背景 */
            border: none;
            box-shadow: none;
            background: none;
            
            /* 布局和最大宽度 */
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 600px;
            margin-top: -100px; /* 稍微向上移动，更平衡 */
        }

        /* --- 头部内容布局（图标 + 标题） --- */
        .header-content {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 50px; /* 与输入框拉开距离 */
        }

        /* 霸气的图标（加大至200像素） */
        .fbi-logo-img {
            width: 200px;
            margin-bottom: 25px;
            box-shadow: 0 0 50px var(--fbi-dark-green); /* 图标增加光晕 */
        }

        /* 霸气的标题文本（中英文都加大、加粗） */
        .fbi-titles { text-align: center; }

        .main-title {
            font-size: 36px; /* 超大字体 */
            font-weight: bold;
            letter-spacing: 6px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--fbi-green); /* 文字增加霓虹灯特效 */
        }

        .sub-title {
            font-size: 18px;
            color: var(--fbi-dark-green);
        }

        /* --- 输入和按钮区域 --- */
        .input-group {
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .login-input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: #000; border: 1px solid var(--fbi-dark-green);
            color: var(--fbi-green); font-family: inherit; font-size: 18px; text-align: center;
            outline: none;
        }
        .login-input:focus { border-color: var(--fbi-green); box-shadow: 0 0 15px var(--fbi-green); }
        
        .login-btn {
            width: 100%; padding: 18px; background: var(--fbi-dark-green);
            color: var(--fbi-green); border: 1px solid var(--fbi-green);
            font-family: inherit; font-size: 20px; font-weight: bold; cursor: pointer; letter-spacing: 2px;
            margin-top: 10px;
        }
        .login-btn:hover { background: var(--fbi-green); color: #000; box-shadow: 0 0 20px var(--fbi-green); }

        /* 打字机效果和淡入动画 */
        #typing-title { min-height: 50px; }
        .input-group { opacity: 0; transition: opacity 1s ease 2s; } /* 打字结束后淡入 */

        /* --- 主控制台（保持原样） --- */
        #main-dashboard {
            display: none; height: 100vh; grid-template-rows: 60px 1fr; grid-template-columns: 250px 1fr;
            opacity: 0; transition: opacity 1s ease;
        }
        /* ...主控制台其他代码保持原样... */
    </style>
</head>
<body onload="startTyping()">

    <div id="lang-toggle" onclick="toggleLang()">[ EN / 中文 ]</div>

    <div id="login-screen">
        <div class="login-box">
            <div class="header-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Seal_of_the_Federal_Bureau_of_Investigation.svg" class="fbi-logo-img" alt="FBI Seal">
                <div class="fbi-titles">
                    <div class="main-title" id="typing-title"></div>
                    <div class="sub-title" data-i18n="header_sub_zh">中央情报终端 V2.5</div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="agent-id" class="login-input" data-i18n-ph="login_id_ph" placeholder="特工编号 (AGENT_ID)" autocomplete="off">
                <input type="password" id="agent-pass" class="login-input" data-i18n-ph="login_pass_ph" placeholder="访问密钥 (PASSWORD)" autocomplete="off">
                <button class="login-btn" onclick="authenticate()" data-i18n="login_btn">验证身份</button>
            </div>
            <p id="auth-msg" style="margin-top: 20px; font-size: 14px; min-height: 20px;"></p>
        </div>
    </div>

    <div id="main-dashboard">
        </div>

    <script>
        // ----------------- 国际化 (i18n) 字典 V3.0 -----------------
        const dict = {
            'zh': {
                'header_main_zh': '美 国 联 邦 调 查 局',
                'header_sub_zh': '中央情报终端 V2.5',
                'login_id_ph': '特工编号 (AGENT_ID)',
                'login_pass_ph': '访问密钥 (PASSWORD)',
                'login_btn': '验证身份',
                // ...主控制台字典保持原样...
            },
            'en': {
                'header_main_zh': 'FEDERAL BUREAU OF INVESTIGATION',
                'header_sub_zh': 'CENTRAL INTELLIGENCE NETWORK V2.5',
                'login_id_ph': 'AGENT_ID',
                'login_pass_ph': 'PASSWORD',
                'login_btn': 'AUTHENTICATE',
                // ...主控制台字典保持原样...
            }
        };

        let currentLang = 'zh';

        // 打字机效果
        let i = 0;
        function startTyping() {
            const text = dict[currentLang]['header_main_zh'];
            if (i < text.length) {
                document.getElementById("typing-title").innerHTML += text.charAt(i);
                i++;
                setTimeout(startTyping, 100); // 打字速度
            } else {
                // 打字结束，淡入输入框
                document.querySelector('.input-group').style.opacity = '1';
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 重置打字机效果
            i = 0;
            document.getElementById("typing-title").innerHTML = "";
            document.querySelector('.input-group').style.opacity = '0';
            startTyping();

            // 切换带有 data-i18n 的普通文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dict[currentLang][key]) el.innerHTML = dict[currentLang][key];
            });

            // 切换带有 data-i18n-ph 的输入框 placeholder
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if(dict[currentLang][key]) el.placeholder = dict[currentLang][key];
            });
        }

        // --- 核心功能逻辑（代码保持原样） ---
        function authenticate() {
            // ...此处省略原 authenticate 代码，你在旧文件中保留它们即可...
        }
        // ...其他代码保持原样...
    </script>
</body>
</html>
